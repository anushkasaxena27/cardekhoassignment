spring:
  application:
    name: CarDekho
  datasource:
    # App tables + Flyway live in schema `cardekho` (see docs/postgresql-local.md). Override URL if needed.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/carapp?currentSchema=cardekho}
    username: ${DATABASE_USER:user2}
    password: ${DATABASE_PASSWORD:password1}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: cardekho
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 32
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: cardekho
    default-schema: cardekho
    create-schemas: false
  cache:
    type: simple

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
  seed:
    enabled: ${SEED_ENABLED:true}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.cardekho: DEBUG
