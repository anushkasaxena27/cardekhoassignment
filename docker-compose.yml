services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carapp
      POSTGRES_USER: cardekho
      POSTGRES_PASSWORD: cardekho
    ports:
      - "5432:5432"
    volumes:
      - cardekho_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardekho -d carapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cardekho_pg:
