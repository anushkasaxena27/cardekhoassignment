# Full stack for sharing: Postgres + Spring Boot + Angular (nginx).
# Open http://localhost:8080 after containers are healthy.
#
# First run builds backend (Maven) + frontend (npm) — can take several minutes.
# After images are cached, a cold start is usually ~1–2 minutes (DB migrate + seed).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carapp
      POSTGRES_USER: cardekho
      POSTGRES_PASSWORD: cardekho
    volumes:
      - cardekho_demo_pg:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardekho -d carapp"]
      interval: 4s
      timeout: 5s
      retries: 15
    expose:
      - "5432"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carapp?currentSchema=cardekho
      SPRING_DATASOURCE_USERNAME: cardekho
      SPRING_DATASOURCE_PASSWORD: cardekho
      SERVER_PORT: "8081"
      SEED_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/api/cars?page=0&size=1 >/dev/null || exit 1"]
      interval: 6s
      timeout: 5s
      retries: 35
      start_period: 120s

  web:
    build:
      context: ./cardekho-web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.demo.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  cardekho_demo_pg:
